name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    services:
      sftp:
        image: atmoz/sftp
        env:
          SFTP_USERS: foo:testpass:1001::upload
        ports:
          - 2222:22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Guard — tag must match package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/mcp/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG != package version $PKG"; exit 1
          fi
      - run: npm run build -w @cordfuse/sftp-mcp
      - name: Wait for SFTP server
        run: |
          for i in $(seq 1 30); do
            if timeout 2 bash -c '</dev/tcp/127.0.0.1/2222' 2>/dev/null; then exit 0; fi
            sleep 1
          done
          echo "sftp did not become ready"; exit 1
      - run: npm test -w @cordfuse/sftp-mcp
        env:
          SFTP_HOST: 127.0.0.1
          SFTP_PORT: 2222
          SFTP_USER: foo
          SFTP_PASS: testpass
      - name: Assert token present
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then echo "NPM_TOKEN missing"; exit 1; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish -w @cordfuse/sftp-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/cordfuse/sftp-mcp:${{ steps.v.outputs.version }}
            ghcr.io/cordfuse/sftp-mcp:latest
